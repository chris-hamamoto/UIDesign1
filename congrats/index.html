<!DOCTYPE html>
<html>

<head>
  <title>Congrats!</title>
  <meta charset="utf-8" />
  <style>
    @font-face {
      font-family: "Ouvrières";
      src: url("Ouvrieres-soldates.woff");
    }
    body {
     
    }

    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #stage {
      width: 1080px;
      height: 1920px;
      position: relative;
      background: radial-gradient(circle, rgba(223,223,223,1) 48%, rgba(251,200,103,1) 100%);
    }
    
    #triangle{
      width: 0;
      height: 0;
      border-top: 180px solid transparent;
      border-right: 900px solid rgba(255,200,200,1);
      border-bottom: 180px solid transparent;
      transform: skew(20deg) rotate(-30deg);
      position: absolute;
      top: 700px;
      left: 30px;
    }

    #rectangle {
      width: 620px;
      height: 310px;
      background: rgb(162 131 131);
      transform: skew(-36deg) rotate(-28.5deg);
      position: absolute;
      top: 938px;
      left: 219px;
    }

    #rectangle-2 {
      width: 620px;
      height: 110px;
      background: rgb(220 220 201);
      transform: skew(-36deg) rotate(-28.5deg);
      position: absolute;
      top: 1038px;
      left: 219px;
    }

    h1 {
      font-family: Ouvrières;
      position: absolute;
      top: 20px;
      text-align: center;
      left: 50%;
      transform: translateX(-50%);
      font-size: 160px;
      text-transform: uppercase;
      font-weight: normal;
    }

  </style>
</head>

<body>
  <div id="container">
    <div id="stage">
      <h1>Congrats!</h1>
      <div id="triangle"></div>
      <div id="rectangle"></div>
      <div id="rectangle-2"></div>
    </div>
    </div>
  </div>
<!-- fonts by Ouvrières by Laure Azizi. Distributed by velvetyne.fr. -->
</body>
</html>
